<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Plays Who - League of Legends</title>
  <link rel="icon" type="image/png" href="Logo_Site/W.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="shared/rank-picker.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #05050A;
      --bg-2:      #0D0D16;
      --bg-3:      #13131F;
      --bg-4:      #1A1A2A;
      --border:    rgba(200,170,110,0.1);
      --border-h:  rgba(200,170,110,0.22);
      --text:      #E8E0D0;
      --text-2:    #A09880;
      --gold:      #C8AA6E;
      --gold-d:    #A0843C;
      --blue:      #4D8EF5;
      --red:       #C8392B;
      --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

    /* ── Layout ── */
    .app { display: grid; grid-template-columns: 300px 1fr 270px; height: 100vh; overflow: hidden; }
    .panel { background: var(--bg-2); border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
    .panel-right { background: var(--bg-2); border-left: 1px solid var(--border); border-right: none; overflow-y: auto; overflow-x: hidden; }
    .main { overflow-y: auto; background: var(--bg); }
    .panel-inner { padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 10px; }

    /* ── Brand ── */
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; padding: 0.25rem 0; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--gold-d), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 12px rgba(200,170,110,0.3); overflow:hidden; padding:6px; } .brand-icon img{width:100%;height:100%;object-fit:contain;}
    .brand-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .lang-switch { display:flex; align-items:center; border:1px solid var(--border-h); flex-shrink:0; }
    .lang-switch button {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      background: transparent; border: none; color: var(--text-2); padding: 5px 9px; cursor: pointer;
      transition: all 0.15s;
    }
    .lang-switch button.active { background: var(--gold); color: #0D0D10; }
    .lang-switch button:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .brand-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.01em; }
    .brand-sub { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }

    /* ── Divider ── */
    .div { height: 1px; background: var(--border); }

    /* ── Labels ── */
    .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-2); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .cnt { background: var(--bg-4); color: var(--text-2); border-radius: 20px; padding: 1px 8px; font-size: 10px; font-weight: 500; text-transform: none; letter-spacing: 0; }

    /* ── Inputs ── */
    input[type=text], select {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); padding: 8px 10px;
      font-size: 13px; font-family: var(--font); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    input[type=text]::placeholder { color: var(--text-2); opacity: 0.6; }
    input[type=text]:focus, select:focus { border-color: var(--gold); }
    select { cursor: pointer; }
    select option { background: var(--bg-3); }
    .player-row select { padding: 8px 4px; font-size: 12px; width: auto; min-width: 0; }

    /* ── Mode switcher ── */
    .mode-sw { display: flex; gap: 3px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-md); padding: 3px; }
    .mode-btn { flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-2); font-family: var(--font); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .mode-btn.active { background: var(--bg-4); color: var(--gold); box-shadow: 0 1px 6px rgba(0,0,0,0.4); }
    .mode-btn:not(.active):hover { color: var(--text); }

    /* ── Player rows ── */
    .player-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
    .player-row { display: grid; grid-template-columns: 1fr auto 28px 28px; gap: 5px; align-items: center; }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold-d), var(--gold)); color: #0D0D10; border: none;
      border-radius: var(--r-md); padding: 10px 16px; font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: var(--font); transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 16px rgba(200,170,110,0.25);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary.sm { padding: 6px 12px; font-size: 12px; width: auto; }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 11px; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font); transition: all 0.15s; }
    .btn-ghost:hover { background: var(--bg-3); color: var(--text); border-color: var(--border-h); }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-ghost.sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost.xs { padding: 3px 7px; font-size: 11px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-2); width: 28px; height: 28px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; padding: 0; }
    .btn-icon:hover { background: var(--bg-4); color: var(--text); }
    .btn-icon.pin.pinned { color: var(--gold); }
    .btn-icon.pin.pinned:hover { background: rgba(200,50,43,0.15); color: var(--red); }
    .btn-icon.del:hover { background: rgba(200,50,43,0.15); color: var(--red); }
    .btn-icon:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Toggle rows ── */
    .toggle-row { display: flex; gap: 10px; align-items: flex-start; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 12px; transition: opacity 0.2s; }
    .toggle-row input[type=checkbox] { width: 14px; height: 14px; margin-top: 3px; flex-shrink: 0; cursor: pointer; accent-color: var(--gold); }
    .toggle-row label { cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
    .tgl-title { font-size: 13px; color: var(--text); font-weight: 500; }
    .tgl-sub { font-size: 11px; color: var(--text-2); }

    /* ── Error ── */
    .error-msg { display: none; font-size: 12px; color: #f07070; background: rgba(200,50,43,0.1); border: 1px solid rgba(200,50,43,0.25); border-radius: var(--r-sm); padding: 8px 10px; }

    /* ── Saved players ── */
    .saved-hd { display: flex; align-items: center; justify-content: space-between; }
    .saved-list { display: flex; flex-direction: column; gap: 4px; }
    .saved-empty { font-size: 12px; color: var(--text-2); text-align: center; padding: 1.2rem 0; line-height: 1.8; opacity: 0.6; }
    .saved-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 10px; gap: 8px; transition: border-color 0.15s; }
    .saved-row:hover { border-color: var(--border-h); }
    .saved-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .saved-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .btn-add { background: rgba(77,142,245,0.15); border: 1px solid rgba(77,142,245,0.3); color: var(--blue); border-radius: var(--r-sm); width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.15s; }
    .btn-add:hover:not(:disabled) { background: rgba(77,142,245,0.3); }
    .btn-add.added { background: rgba(60,180,100,0.15); border-color: rgba(60,180,100,0.3); color: #50c870; cursor: default; }
    .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }
    .add-saved-form { display: none; flex-direction: column; gap: 7px; background: var(--bg-3); border: 1px solid var(--border-h); border-radius: var(--r-md); padding: 11px; }
    .add-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .edit-saved-form { display: none; flex-direction: column; gap: 7px; background: var(--bg); border: 1px solid var(--border-h); border-radius: var(--r-md); padding: 10px; margin-top: 3px; }
    .edit-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .storage-status { font-size: 10px; color: var(--text-2); display: flex; align-items: center; gap: 5px; opacity: 0.7; }
    .storage-dot { width: 5px; height: 5px; border-radius: 50%; background: #50c870; flex-shrink: 0; }
    .storage-dot.error { background: var(--red); }

    /* ── Saved search / autocomplete ── */
    .search-wrap { position: relative; }
    .search-wrap i.ti-search { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-2); pointer-events: none; }
    .search-wrap input[type=text] { padding-left: 30px; }
    .search-wrap .btn-icon.clear { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; }
    .suggestions-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-3); border: 1px solid var(--border-h);
      border-radius: var(--r-md); max-height: 230px; overflow-y: auto;
      z-index: 30; box-shadow: 0 10px 30px rgba(0,0,0,0.55); display: none;
    }
    .suggestion-item {
      padding: 8px 11px; font-size: 13px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--bg-4); }
    .suggestion-item .sugg-name strong { color: var(--gold); }
    .suggestion-item.disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Rank badges → see shared/rank-picker.css (.rank-badge) ── */

    /* ── Role badges ── */
    .role-badge { border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 600; white-space: nowrap; border: 1px solid; }
    .role-top     { background: rgba(224,112,96,0.12); color: #e07060; border-color: rgba(224,112,96,0.3); }
    .role-jungle  { background: rgba(96,200,112,0.12); color: #50c870; border-color: rgba(96,200,112,0.3); }
    .role-mid     { background: rgba(112,168,240,0.12); color: #70a8f0; border-color: rgba(112,168,240,0.3); }
    .role-adc     { background: rgba(212,168,64,0.12); color: #d4a840; border-color: rgba(212,168,64,0.3); }
    .role-supp    { background: rgba(184,136,238,0.12); color: #b888ee; border-color: rgba(184,136,238,0.3); }

    /* ── MAIN content ── */
    .main-inner { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; min-height: 100%; }

    /* ── Placeholder ── */
    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; opacity: 0.35; padding: 3rem 0; }
    .placeholder-icon { font-size: 56px; }
    .placeholder p { font-size: 14px; line-height: 1.9; color: var(--text-2); }

    /* ── Result ── */
    .result { display: none; flex-direction: column; gap: 1.5rem; }
    .result-hd { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .result-hd h2 { font-size: 20px; font-weight: 700; color: var(--text); }
    .result-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .diff-row { text-align: center; font-size: 12px; color: var(--text-2); padding: 0.25rem 0; }
    .diff-row strong { color: var(--gold); }

    /* ── Teams grid ── */
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── Team section ── */
    .team-section { display: flex; flex-direction: column; gap: 10px; }
    .team-hd { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .team-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .team-title.blue { color: var(--blue); }
    .team-title.red  { color: #e05252; }
    .team-score-lbl { font-size: 11px; color: var(--text-2); }

    /* ══════════════════════════════════════════
       PLAYER CARDS - signature design element
    ══════════════════════════════════════════ */
    .player-cards { display: flex; flex-direction: column; gap: 8px; }

    .player-card {
      position: relative; border-radius: var(--r-lg); overflow: hidden;
      background: var(--bg-3); border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      min-height: 80px;
    }
    .player-card:hover { border-color: var(--border-h); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

    /* Champion art en fond */
    .card-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      opacity: 0.18; filter: blur(1px) saturate(0.6);
      transition: opacity 0.3s;
    }
    .player-card:hover .card-bg { opacity: 0.25; }

    /* Bord coloré gauche selon équipe */
    .player-card::before, .bravery-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .player-card.team-blue::before, .bravery-card.team-blue::before { background: linear-gradient(to bottom, #4d8ef5, #2a5cc0); box-shadow: 2px 0 8px rgba(77,142,245,0.4); }
    .player-card.team-red::before, .bravery-card.team-red::before  { background: linear-gradient(to bottom, #e05252, #a02828); box-shadow: 2px 0 8px rgba(224,82,82,0.4); }
    .player-card.team-gold::before, .bravery-card.team-gold::before { background: linear-gradient(to bottom, var(--gold), var(--gold-d)); box-shadow: 2px 0 8px rgba(200,170,110,0.4); }

    /* Contenu de la carte */
    .card-body {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 52px 1fr auto;
      align-items: center; gap: 10px; padding: 10px 12px 10px 14px;
    }

    /* Portrait champion */
    .card-champ-img {
      width: 52px; height: 52px; border-radius: 10px;
      object-fit: cover; object-position: top;
      border: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0; background: var(--bg-4);
    }
    .card-champ-wrap { position: relative; flex-shrink: 0; }
    .btn-reroll-single {
      position: absolute; bottom: -4px; right: -4px;
      width: 19px; height: 19px; border-radius: 50%;
      background: var(--bg-4); border: 1px solid var(--border-h);
      color: var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 10px; cursor: pointer; transition: all 0.15s; padding: 0;
    }
    .btn-reroll-single:hover { background: var(--gold); color: #0D0D10; transform: rotate(90deg); }
    .card-champ-placeholder {
      width: 52px; height: 52px; border-radius: 10px;
      background: var(--bg-4); border: 1px dashed var(--border-h);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 20px; flex-shrink: 0;
    }

    /* Infos joueur */
    .card-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .card-champ-name { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-champ-name.empty { color: var(--text-2); opacity: 0.5; font-weight: 400; text-transform: none; font-style: italic; }
    .card-player-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

    /* Score/rank à droite */
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    /* ── Result in flex mode : single team full width ── */
    .single-team { grid-column: 1 / -1; }
    .single-team .player-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }


    /* ── Role block (droite de la carte) ── */
    .card-role {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; flex-shrink: 0; padding: 0 4px;
      min-width: 52px;
    }
    .card-role img {
      width: 34px; height: 34px; object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
    }
    .card-role-name {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-2); white-space: nowrap;
    }


    /* ── Cartes verticales mode Flex ── */
    .flex-cards-grid {
      grid-column: 1 / -1;
      display: flex; gap: 12px; flex-wrap: nowrap; overflow-x: auto;
      padding-bottom: 4px;
    }
    .flex-cards-grid::-webkit-scrollbar { height: 3px; }
    .flex-cards-grid::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 10px; }

    .player-card-v {
      flex: 1; min-width: 180px; max-width: 260px;
      border-radius: var(--r-lg); overflow: hidden;
      background: var(--bg-3); border: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
    }
    .player-card-v:hover { border-color: var(--border-h); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
    .player-card-v::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2;
    }
    .player-card-v.team-gold::before { background: linear-gradient(90deg, var(--gold), var(--gold-d)); }
    .player-card-v.team-blue::before { background: linear-gradient(90deg, #4d8ef5, #2a5cc0); }
    .player-card-v.team-red::before  { background: linear-gradient(90deg, #e05252, #a02828); }

    /* Image champion pleine largeur */
    .card-v-img-wrap {
      width: 100%; aspect-ratio: 1 / 1; overflow: hidden;
      background: var(--bg-4); position: relative;
    }
    .card-v-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      display: block; transition: transform 0.3s;
    }
    .player-card-v:hover .card-v-img-wrap img { transform: scale(1.04); }
    .card-v-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 40px; opacity: 0.3;
    }
    .card-v-img-wrap .btn-reroll-single {
      position: absolute; bottom: 6px; right: 6px;
      width: 24px; height: 24px; font-size: 12px;
      background: rgba(13,13,16,0.75); backdrop-filter: blur(4px);
    }

    /* Infos en bas de la carte verticale */
    .card-v-body {
      padding: 10px 12px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card-v-champ {
      font-size: 11px; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-v-player {
      font-size: 17px; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-v-footer {
      display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 2px;
    }
    .card-v-role {
      display: flex; align-items: center; gap: 5px;
    }
    .card-v-role img { width: 22px; height: 22px; object-fit: contain; }
    .card-v-role-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-2); }

    .teams-grid.mode-single { display: block !important; }

    /* ─── Media queries ─── */
    @media (max-width: 1100px) {
      .app { grid-template-columns: 270px 1fr 240px; }
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; height: auto; overflow: visible; }

      .player-row { grid-template-columns: 1fr auto 28px 28px; }
    }

    /* ════════════════════════════════════════════════════════
       REFONTE VISUELLE - identité broadcast / esport premium
       (signature : panneaux à coin coupé façon overlay de diffusion,
       typographie display + mono façon scoreboard)
    ════════════════════════════════════════════════════════ */
    :root {
      --font-display: 'Bricolage Grotesque', var(--font);
      --font-mono: 'JetBrains Mono', monospace;
    }

    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:50; opacity:0.4;
      background-image:repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    }

    /* Typographie */
    .brand-name, h2#sessionTitle, .team-title, .card-v-player, .placeholder p strong { font-family: var(--font-display); letter-spacing: -0.01em; }
    .lbl, .nav-sub, .brand-sub, .card-v-champ, .card-v-role-name, .card-role-name, .team-score-lbl, #playerCount, .stat-lbl {
      font-family: var(--font-mono);
    }
    h2#sessionTitle { font-weight: 700; font-size: 19px; }
    .card-champ-name { font-family: var(--font-mono); letter-spacing: 0.02em; }

    /* Trame / accent supérieur des panneaux */
    .panel, .panel-right { position: relative; }
    .panel::before, .panel-right::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5;
    }

    /* Logo + brand : coin coupé */
    .brand-icon, .nav-icon {
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    /* Signature : coin coupé (haut-droit) sur les panneaux fonctionnels */
    .player-card, .saved-row, .toggle-row, .add-saved-form, .edit-saved-form, .mode-sw {
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    }
    .card-v-img-wrap, .card-champ-img, .card-champ-placeholder {
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 0 100%);
    }
    .player-card-v {
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    }

    /* Boutons : coin coupé + effet de balayage lumineux au survol */
    .btn-primary {
      position: relative; overflow: hidden; text-transform: uppercase; letter-spacing: 0.05em;
      font-family: var(--font-display); font-weight: 700;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }
    .btn-primary::after {
      content:''; position: absolute; top: 0; left: -60%; width: 35%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg); transition: left 0.5s ease;
    }
    .btn-primary:hover::after { left: 130%; }
    .btn-ghost, .btn-icon { clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 0 100%); }

    /* Accessibilité - focus visible */
    a:focus-visible, button:focus-visible, input:focus-visible, .player-card:focus-visible {
      outline: 2px solid var(--gold); outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }

    /* ── Mode Téméraire : runes + build imposés (icônes uniquement) ── */
    .teams-grid.bravery-active { grid-template-columns: 1fr; gap: 10px; }
    .bravery-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    @media (max-width: 1100px) { .bravery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .bravery-grid { grid-template-columns: repeat(2, 1fr); } }
    .bravery-card {
      position: relative; background: var(--bg-3); border: 1px solid var(--border); padding: 8px 9px 8px 11px;
      display: flex; flex-direction: column; gap: 6px; min-width: 0;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }
    .bravery-hd { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .bravery-role { flex-shrink: 0; display: flex; align-items: center; }
    .bravery-role img { width: 16px; height: 16px; object-fit: contain; }
    .bravery-player { font-weight: 700; font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bravery-champ-block { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .bravery-champ { font-family: var(--font-mono); font-size: 9.5px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
    .bravery-champ-wrap { position: relative; flex-shrink: 0; }
    .bravery-champ-wrap .card-champ-img { width: 26px; height: 26px; border-radius: 5px; }
    .bravery-champ-wrap .btn-reroll-single { width: 13px; height: 13px; font-size: 7px; bottom: -3px; right: -3px; }
    .bravery-runes { display: flex; flex-direction: column; gap: 4px; }
    .bravery-rune-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .bravery-tree-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
    .bravery-keystone-icon { width: 20px; height: 20px; object-fit: contain; border-radius: 50%; background: var(--bg-4); flex-shrink: 0; }
    .bravery-minor-icon { width: 15px; height: 15px; object-fit: contain; border-radius: 50%; background: var(--bg-4); flex-shrink: 0; padding: 1px; }
    .bravery-shard-sep { width: 1px; height: 14px; background: var(--border); margin: 0 1px; flex-shrink: 0; }
    .bravery-shard-icon { width: 15px; height: 15px; object-fit: contain; flex-shrink: 0; border-radius: 50%; background: var(--bg-4); padding: 1px; }

  const braveryOn = document.getElementById('braveryToggle').checked;
  const rolesToggle = document.getElementById('rolesToggle');
  const row = document.getElementById('rolesToggleRow');

/* ─── Storage ─── */
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { const d = JSON.parse(raw); savedPlayers = d.players||[]; savedCounter = d.counter||savedPlayers.length; }
    else { savedPlayers = []; savedCounter = 0; }
  } catch(e) { savedPlayers = []; savedCounter = 0; }
  updateStorageStatus(); renderSaved();
}
function persistSaved() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({players:savedPlayers,counter:savedCounter})); updateStorageStatus(); }
  catch(e) { document.getElementById('storageDot').className='storage-dot error'; }
}
function updateStorageStatus() {
  document.getElementById('storageDot').className = 'storage-dot';
  const n = savedPlayers.length;
  const lbl = CUR_LANG === 'en'
    ? (n === 0 ? 'No saved players' : `${n} player${n>1?'s':''} saved`)
    : (n === 0 ? 'Aucun joueur enregistré' : `${n} joueur${n>1?'s':''} enregistré${n>1?'s':''}`);
  document.getElementById('storageLabel').textContent = lbl;
}

function rankInfo(val) { return RANKS.find(r => r.value === val) || RANKS[0]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rankOptions(sel) { return RANKS.map(r => `<option value="${r.value}"${r.value===sel?' selected':''}>${r.label}</option>`).join(''); }
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }
function popcount(n) { let c=0; while(n){ c+=n&1; n>>=1; } return c; }

function pickChampForRole(role, usedChamps) {
  const pool = (CHAMPS_BY_ROLE[role] || CHAMPIONS).filter(c => !usedChamps.has(c));
  // si pool vide (tous déjà pris), fallback sur CHAMPIONS entier
  const fallback = pool.length > 0 ? pool : CHAMPIONS.filter(c => !usedChamps.has(c));
  const pick = fallback[Math.floor(Math.random() * fallback.length)];
  usedChamps.add(pick);
  return pick;
}

function pickChampsForRoles(roles) {
  const used = new Set();
  return roles.map(role => pickChampForRole(role, used));
}

function pickChampions(count) { return shuffle([...CHAMPIONS]).slice(0,count); }

function pickUnique(arr, n) { return shuffle([...arr]).slice(0, n); }

function rollOneBravery(role) {
  const trees = Object.keys(RUNE_TREES);
  const primaryName = trees[Math.floor(Math.random()*trees.length)];
  const secondaryName = trees.filter(t => t !== primaryName)[Math.floor(Math.random()*(trees.length-1))];
  const primary = RUNE_TREES[primaryName], secondary = RUNE_TREES[secondaryName];
  const keystone = primary.keystones[Math.floor(Math.random()*primary.keystones.length)];
  const primaryMinors = pickUnique(primary.minors, 3);
  const secondaryMinors = pickUnique(secondary.minors, 2);
  const shards = STAT_SHARDS.map(row => row[Math.floor(Math.random()*row.length)]);
  const boots = BOOTS[Math.floor(Math.random()*BOOTS.length)];
  // ADC : bottes + 6 objets (7 au total) - Supp : bottes + 1 objet support + 4 objets (6 au total) - autres : bottes + 5 objets (6 au total)
  let items;
  if (role === 'Supp') {
    const supportItem = SUPPORT_ITEMS[Math.floor(Math.random()*SUPPORT_ITEMS.length)];
    items = [supportItem, ...pickUnique(ITEMS, 4)];
  } else {
    const itemCount = role === 'ADC' ? 6 : 5;
    items = pickUnique(ITEMS, itemCount);
  }
  return {
    primaryName, secondaryName,
    primaryColor: primary.color, secondaryColor: secondary.color,
    keystone, primaryMinors, secondaryMinors, shards, boots, items,
  };
}

/* Section d'équipe en mode Téméraire : même en-tête que buildTeamSection,
   mais avec des cartes runes + build au lieu des cartes joueur classiques. */
function buildBraveryTeamSection(title, players, score, champs, braveryArr, color, side, roles) {
  // Affiche toujours les cartes dans l'ordre Top → Jungle → Mid → ADC → Supp
  // (uniquement l'ordre d'affichage, le tirage aléatoire lui n'est pas modifié).
  let order = players.map((p, i) => i);
  if (roles) {
    const roleOrder = ['Top', 'Jungle', 'Mid', 'ADC', 'Supp'];
    order.sort((a, b) => roleOrder.indexOf(roles[a]) - roleOrder.indexOf(roles[b]));
  }
  const cards = order.map(i=>buildBraveryCard(players[i], champs?champs[i]:null, braveryArr[i], color, side, i, roles?roles[i]:null)).join('');
  const header = title
    ? (() => {
        const avg = rankInfo(Math.round(score/players.length));
        return `<div class="team-hd"><span class="team-title ${color}">${title}</span><span class="team-score-lbl">${score} ${t('pts')} · ${t('avg')} ${avg.label}</span></div>`;
      })()
    : '';
  return `<div class="team-section">${header}<div class="bravery-grid">${cards}</div></div>`;
}

async function rerollBraveryOnly() {
  if (!lastT1 || !lastT1.length) return;
  lastBravery1 = lastT1.map((p,i) => rollOneBravery(lastRoles1 ? lastRoles1[i] : null));
  lastBravery2 = (lastT2 && lastT2.length) ? lastT2.map((p,i) => rollOneBravery(lastRoles2 ? lastRoles2[i] : null)) : [];
  renderResult();
}

async function rerollBraveryAll() {
  if (!lastT1 || !lastT1.length) return;
  if (currentMode === 'flex') {
    lastChamps1 = lastRoles1 ? pickChampsForRoles(lastRoles1) : pickChampions(lastT1.length);
  } else {
    if (lastRoles1) {
      const used = new Set();
      lastChamps1 = lastRoles1.map(r => pickChampForRole(r, used));
      lastChamps2 = lastRoles2.map(r => pickChampForRole(r, used));
    } else {
      const pick = pickChampions(lastT1.length + lastT2.length);
      lastChamps1 = pick.slice(0, lastT1.length); lastChamps2 = pick.slice(lastT1.length);
    }
  }
  lastBravery1 = lastT1.map((p,i) => rollOneBravery(lastRoles1 ? lastRoles1[i] : null));
  lastBravery2 = (lastT2 && lastT2.length) ? lastT2.map((p,i) => rollOneBravery(lastRoles2 ? lastRoles2[i] : null)) : [];
  renderResult();
}

  const q = query.trim();
  if (!q) return esc(name);
  const idx = name.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return esc(name);
  return esc(name.slice(0, idx)) + '<strong>' + esc(name.slice(idx, idx + q.length)) + '</strong>' + esc(name.slice(idx + q.length));
}

function updateSavedSuggestions(query) {
  const dd = document.getElementById('savedSuggestions');
  const q = query.trim();
  if (!q) { dd.style.display = 'none'; dd.innerHTML = ''; return; }
  const matches = matchSavedPlayers(q).slice(0, 8);
  if (!matches.length) {

    dd.style.display = 'block';

  dd.innerHTML = matches.map(sp => {

    const full = players.length >= getMaxPlayers();
    const disabled = alreadyIn || full;
    return `<div class="suggestion-item${disabled?' disabled':''}" onmousedown="event.preventDefault();selectSuggestion('${sp.id}')">
      <span class="sugg-name">${highlightMatch(sp.name, q)}</span>

  }).join('');
  dd.style.display = 'block';

  const sp = savedPlayers.find(s => s.id === sid); if (!sp) return;
  if (players.some(p => p.name === sp.name) || players.length >= getMaxPlayers()) return;
  addFromSaved(sid);
  document.getElementById('savedSearch').value = '';
  savedSearchQuery = '';
  document.getElementById('savedSearchClear').style.display = 'none';
  document.getElementById('savedSuggestions').style.display = 'none';
  renderSaved();
}

function onSavedSearchKeydown(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const q = e.target.value.trim().toLowerCase();
    if (!q) return;
    const exact = savedPlayers.find(s => s.name.toLowerCase() === q);
    if (exact) { selectSuggestion(exact.id); return; }
    const matches = matchSavedPlayers(q);
    if (matches.length === 1) selectSuggestion(matches[0].id);
  } else if (e.key === 'Escape') {
    document.getElementById('savedSuggestions').style.display = 'none';
  }
}

  document.getElementById('savedSearch').value = '';

/* ─── Algorithm ─── */
function bestSplit(arr) {
  const n=arr.length, half=n/2; let bestDiff=Infinity; const bestMasks=[];
  for(let mask=0;mask<(1<<n);mask++) {
    if(popcount(mask)!==half) continue;
    let s1=0,s2=0;
    for(let i=0;i<n;i++) (mask&(1<<i))?s1+=arr[i].rank:s2+=arr[i].rank;
    const diff=Math.abs(s1-s2);
    if(diff<bestDiff){ bestDiff=diff; bestMasks.length=0; bestMasks.push(mask); }
    else if(diff===bestDiff) bestMasks.push(mask);
  }
  const seen=new Set(), unique=[];
  for(const mask of bestMasks){ const full=(1<<n)-1; const key=Math.min(mask,(~mask)&full); if(!seen.has(key)){ seen.add(key); unique.push(mask); } }
  let pool=unique.filter(m=>m!==lastMask); if(!pool.length) pool=unique;
  const chosen=pool[Math.floor(Math.random()*pool.length)];
  lastMask=chosen;
  const t1=[],t2=[];
  for(let i=0;i<n;i++) (chosen&(1<<i))?t1.push(arr[i]):t2.push(arr[i]);
  return [t1,t2,bestDiff,unique.length];
}

/* ─── Generate ─── */
async function generate() {
  document.getElementById('errorMsg').style.display='none';
  const valid=players.filter(p=>p.name.trim());
  const braveryOn=document.getElementById('braveryToggle').checked;
  const useRoles=document.getElementById('rolesToggle').checked || braveryOn;
  const useChamps=document.getElementById('champToggle').checked || braveryOn;

  if (currentMode === 'flex') {
    if (valid.length < 1) return showError(t('errMin1'));
    if (valid.length > 5) return showError(t('errMaxFlex'));
    if (useRoles && valid.length !== 5) return showError(t('errRoles5'));
    const roles = useRoles ? shuffle(ROLES) : null;
    const champs = useChamps ? (roles ? pickChampsForRoles(roles) : pickChampions(valid.length)) : null;
    const score = valid.reduce((a,p)=>a+parseInt(p.rank),0);
    lastT1=valid; lastT2=[]; lastS1=score; lastS2=0;
    lastRoles1=roles; lastRoles2=null; lastChamps1=champs; lastChamps2=null;
    document.getElementById('sessionTitle').textContent = t('sessionFlex');
    document.getElementById('diffRow').innerHTML = '';
  } else {
    if (valid.length < 2) return showError(t('errMin2'));
    if (valid.length % 2 !== 0) return showError(t('errEven'));
    if (useRoles && valid.length !== 10) return showError(t('errRoles10'));
    const [t1,t2,diff,combos]=bestSplit(valid.map(p=>({...p,rank:parseInt(p.rank)})));
    const roles1=useRoles?shuffle(ROLES):null, roles2=useRoles?shuffle(ROLES):null;
    let champs1=null, champs2=null;
    if (useChamps) {
      if (roles1) {
        const used = new Set();
        champs1 = roles1.map(r => pickChampForRole(r, used));
        champs2 = roles2.map(r => pickChampForRole(r, used));
      } else {
        const pick=pickChampions(t1.length+t2.length); champs1=pick.slice(0,t1.length); champs2=pick.slice(t1.length);
      }
    }
    document.getElementById('sessionTitle').textContent = t('sessionResult');
    const s1=t1.reduce((a,p)=>a+p.rank,0), s2=t2.reduce((a,p)=>a+p.rank,0);
    lastT1=t1; lastT2=t2; lastS1=s1; lastS2=s2;
    lastRoles1=roles1; lastRoles2=roles2; lastChamps1=champs1; lastChamps2=champs2;
    const ctxt=combos>1?` · ${combos} ${t('combosLabel')}`:'';
    document.getElementById('diffRow').innerHTML = `${t('diffLabel')} : <strong>${diff} ${t('pts')}</strong>${ctxt}`;
  }

  if (braveryOn) {
      lastBravery1 = lastT1.map((p,i) => rollOneBravery(lastRoles1 ? lastRoles1[i] : null));
    lastBravery2 = (lastT2 && lastT2.length) ? lastT2.map((p,i) => rollOneBravery(lastRoles2 ? lastRoles2[i] : null)) : [];
  } else {
    lastBravery1 = null; lastBravery2 = null;
  }

  renderResult();

  document.getElementById('placeholder').style.display='none';
  document.getElementById('result').style.display='flex';
  document.getElementById('rerollRolesBtn').style.display = (useRoles && !braveryOn)?'inline-flex':'none';
  document.getElementById('rerollChampsBtn').style.display = (useChamps && !braveryOn)?'inline-flex':'none';
  document.getElementById('rerollBraveryOnlyBtn').style.display = braveryOn?'inline-flex':'none';
  document.getElementById('rerollBraveryAllBtn').style.display = braveryOn?'inline-flex':'none';
}

function rerollRoles() {
  if(!lastT1.length) return;
  if(currentMode==='flex') {
    lastRoles1=shuffle(ROLES);
    if(lastChamps1) lastChamps1 = pickChampsForRoles(lastRoles1); // synchro champions/roles
  } else {
    lastRoles1=shuffle(ROLES); lastRoles2=shuffle(ROLES);
  }
  renderResult();
}
function rerollChampions() {
  if(!lastT1.length) return;
  if(currentMode==='flex') {
    lastChamps1 = lastRoles1 ? pickChampsForRoles(lastRoles1) : pickChampions(lastT1.length);
  } else {
    if (lastRoles1) {
      const used = new Set();
      lastChamps1 = lastRoles1.map(r => pickChampForRole(r, used));
      lastChamps2 = lastRoles2.map(r => pickChampForRole(r, used));
    } else {
      const pick=pickChampions(lastT1.length+lastT2.length);
      lastChamps1=pick.slice(0,lastT1.length); lastChamps2=pick.slice(lastT1.length);
    }
  }
  renderResult();
}

function showError(msg) { const el=document.getElementById('errorMsg'); el.textContent=msg; el.style.display='block'; }

/* ─── Relancer le champion d'un seul joueur ───
   Garde tout le reste identique : équipes, rôles, autres champions.
   Si le joueur n'a pas ce champion ("Je n'ai pas ce champion"), un clic
   suffit pour lui tirer un autre champion valide (respecte son rôle si
   les rôles sont actifs, et évite les doublons avec les champions
   actuellement attribués dans la partie). */
function rerollSinglePlayer(side, idx) {
  const used = new Set([...(lastChamps1||[]), ...(lastChamps2||[])].filter(Boolean));
  let role = null, current = null;
  if (side === 'flex') { role = lastRoles1 ? lastRoles1[idx] : null; current = lastChamps1[idx]; used.delete(current); }
  else if (side === 'team1') { role = lastRoles1 ? lastRoles1[idx] : null; current = lastChamps1[idx]; used.delete(current); }
  else { role = lastRoles2 ? lastRoles2[idx] : null; current = lastChamps2[idx]; used.delete(current); }

  const newChamp = role ? pickChampForRole(role, used) : pickChampions(CHAMPIONS.length).find(c => !used.has(c)) || current;

  if (currentMode === 'flex') lastChamps1[idx] = newChamp;
  else if (side === 'team1') lastChamps1[idx] = newChamp;
  else lastChamps2[idx] = newChamp;

  // En Mode Téméraire, relancer le champion d'un joueur relance aussi
  // ses runes et son build, puisque tout est censé être imposé ensemble.
  const braveryOn = document.getElementById('braveryToggle').checked;
  if (braveryOn) {
    const newBravery = rollOneBravery(role);
    if (currentMode === 'flex') lastBravery1[idx] = newBravery;
    else if (side === 'team1') lastBravery1[idx] = newBravery;
    else lastBravery2[idx] = newBravery;
  }

  renderResult();
}


/* ─── Build flex cards (layout vertical) ─── */
function buildFlexCards(title, players, roles, champs, color) {
  const score = players.reduce((a,p)=>a+parseInt(p.rank),0);
  const avg = rankInfo(Math.round(score/players.length));

  // Trier l'affichage horizontal selon l'ordre des rôles (Top → Jungle → Mid → ADC → Supp)
  // sans modifier le tirage aléatoire - uniquement l'ordre gauche→droite des cartes.
  let order = players.map((p, i) => i);
  if (roles) {
    const roleOrder = ['Top', 'Jungle', 'Mid', 'ADC', 'Supp'];
    order.sort((a, b) => roleOrder.indexOf(roles[a]) - roleOrder.indexOf(roles[b]));
  }

  const cards = order.map(i => {
    const p = players[i];
    const ri = rankInfo(p.rank);
    const champ = champs ? champs[i] : null;
    const role  = roles  ? roles[i]  : null;
    const imgHtml = champ
      ? `<img src="icon_champion/${champ}_0.jpg" alt="${champ}" onerror="this.parentElement.innerHTML='<div class=card-v-img-placeholder><i class=ti ti-user></i></div>'">`
      : `<div class="card-v-img-placeholder"><i class="ti ti-user"></i></div>`;
    const champName = champ ? `<div class="card-v-champ">${champ}</div>` : '';
    const roleHtml = role
      ? `<div class="card-v-role"><img src="${ROLE_IMG[role]}" alt="${role}"><span class="card-v-role-name">${role}</span></div>`
      : '';
    const rerollBtn = champ
      ? `<button class="btn-reroll-single" onclick="event.stopPropagation();rerollSinglePlayer('flex',${i})" title="Je n'ai pas ce champion - relancer">
           <i class="ti ti-refresh"></i>
         </button>`
      : '';
    return `<div class="player-card-v team-${color}">
      <div class="card-v-img-wrap">${imgHtml}${rerollBtn}</div>
      <div class="card-v-body">
        ${champName}
        <div class="card-v-player">${esc(p.name)}</div>
        <div class="card-v-footer">
          ${roleHtml}
          ${rankBadge(p.rank)}
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="flex-cards-grid">
    ${cards}
  </div>`;
}

/* ─── Build team section ─── */
function buildTeamSection(title, players, score, roles, champs, color, side) {
  const avg = rankInfo(Math.round(score/players.length));

  // Trier l'affichage selon l'ordre des rôles (Top → Jungle → Mid → ADC → Supp)
  // sans modifier le tirage aléatoire lui-même - uniquement l'ordre de présentation.
  let order = players.map((p, i) => i);
  if (roles) {
    const roleOrder = ['Top', 'Jungle', 'Mid', 'ADC', 'Supp'];
    order.sort((a, b) => roleOrder.indexOf(roles[a]) - roleOrder.indexOf(roles[b]));
  }

  const cards = order.map(i => {
    const p = players[i];
    const ri = rankInfo(p.rank);
    const champ = champs ? champs[i] : null;
    const role  = roles  ? roles[i]  : null;
    const bg = champ ? `style="background-image:url('icon_champion/${champ}_0.jpg')"` : '';
    const rerollBtn = champ
      ? `<button class="btn-reroll-single" onclick="event.stopPropagation();rerollSinglePlayer('${side}',${i})" title="Je n'ai pas ce champion - relancer">
           <i class="ti ti-refresh"></i>
         </button>`
      : '';
    const champImg = champ
      ? `<div class="card-champ-wrap"><img class="card-champ-img" src="icon_champion/${champ}_0.jpg" alt="${champ}" onerror="this.style.display='none'">${rerollBtn}</div>`
      : '';
    const champName = champ ? `<span class="card-champ-name">${champ}</span>` : '';
    const roleBlock = role
      ? `<div class="card-role">
           <img src="${ROLE_IMG[role]}" alt="${role}">
           <span class="card-role-name">${role}</span>
         </div>`
      : '';
    // grid: [champ?] [info] [role?]
    const cols = [champ ? '52px' : null, '1fr', role ? '52px' : null].filter(Boolean).join(' ');
    return `<div class="player-card team-${color}">
      <div class="card-bg" ${bg}></div>
      <div class="card-body" style="grid-template-columns:${cols}">
        ${champImg}
        <div class="card-info">
          ${champName}
          <span class="card-player-name">${esc(p.name)}</span>
          <div class="card-badges">${rankBadge(p.rank)}</div>
        </div>
        ${roleBlock}
      </div>
    </div>`;
  }).join('');
  return `<div class="team-section">
    <div class="team-hd">
      <span class="team-title ${color}">${title}</span>
      <span class="team-score-lbl">${score} ${t('pts')} · ${t('avg')} ${avg.label}</span>
    </div>
    <div class="player-cards">${cards}</div>
  </div>`;
}
