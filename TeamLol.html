<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Maker — League of Legends</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --bg-2:         #181c25;
      --bg-3:         #1e2330;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text:         #e8eaf0;
      --text-muted:   #7a7f94;
      --accent-blue:  #4d8ef5;
      --accent-red:   #e05252;
      --accent-gold:  #c89b3c;
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    14px;
      --font:         system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    .page {
      display: grid;
      grid-template-columns: 290px 1fr 260px;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-left {
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .main-content {
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar-right {
      background: var(--bg-2);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-inner {
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 26px; line-height: 1; }
    .brand h1 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
    .brand p  { font-size: 10px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }

    .field-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
    }
    .count-badge {
      font-size: 10px; font-weight: 500; text-transform: none; letter-spacing: 0;
      background: var(--bg-3); color: var(--text-muted);
      border-radius: 20px; padding: 1px 8px;
    }

    input[type=text], select {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      padding: 8px 10px; font-size: 13px; font-family: var(--font);
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    input[type=text]::placeholder { color: var(--text-muted); }
    input[type=text]:focus, select:focus { border-color: var(--accent-blue); }
    select { cursor: pointer; }
    select option { background: var(--bg-3); color: var(--text); }

    .player-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .player-row { display: grid; grid-template-columns: 1fr 115px 28px 28px; gap: 6px; align-items: center; }

    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px;
      padding: 0; width: 28px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); transition: background 0.15s, color 0.15s;
    }
    .remove-btn:hover { background: rgba(224,82,82,0.15); color: var(--accent-red); }

    .pin-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 15px;
      padding: 0; width: 28px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); transition: background 0.15s, color 0.15s;
    }
    .pin-btn:hover { background: rgba(200,155,60,0.15); color: var(--accent-gold); }
    .pin-btn.pinned { color: var(--accent-gold); cursor: default; }
    .pin-btn.pinned:hover { background: none; }

    .toggle-row {
      display: flex; gap: 10px; align-items: flex-start;
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 10px 12px;
    }
    .toggle-row input[type=checkbox] {
      width: 15px; height: 15px; margin-top: 2px;
      flex-shrink: 0; cursor: pointer; accent-color: var(--accent-blue);
    }
    .toggle-row label { cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
    .toggle-title { font-size: 13px; color: var(--text); font-weight: 500; }
    .toggle-sub   { font-size: 11px; color: var(--text-muted); }

    .btn-primary {
      background: var(--accent-blue); color: #fff; border: none;
      border-radius: var(--radius-md); padding: 10px 16px;
      font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: var(--font); transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover  { background: #3b7de8; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary.sm { padding: 7px 12px; font-size: 13px; width: auto; }

    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 7px 12px; font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font); transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { background: var(--bg-3); color: var(--text); border-color: var(--border-hover); }
    .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-ghost.sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost.xs { padding: 3px 8px; font-size: 11px; }

    .error-msg {
      display: none; font-size: 12px; color: #f07070;
      background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.25);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }

    .result-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); gap: 14px; text-align: center; opacity: 0.4;
    }
    .placeholder-icon { font-size: 52px; }
    .result-placeholder p { font-size: 14px; line-height: 1.9; }

    .result { display: none; flex-direction: column; gap: 1.25rem; }
    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }
    .result-header h2 { font-size: 18px; font-weight: 600; }

    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .team-card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem; border-top-width: 3px;
    }
    .team-card.blue { border-top-color: var(--accent-blue); }
    .team-card.red  { border-top-color: var(--accent-red); }

    .team-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .team-avg  { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

    .team-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .team-list li {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .team-list li:last-child { border-bottom: none; }
    .player-name { color: var(--text); }
    .player-meta { display: flex; gap: 5px; align-items: center; }

    .diff-row { text-align: center; font-size: 13px; color: var(--text-muted); padding-top: 4px; }
    .diff-row strong { color: var(--text); }

    .badge { border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .rank-debutant    { background: rgba(100,100,100,0.25); color: #aaa; }
    .rank-iron        { background: rgba(160,140,120,0.25); color: #c0b090; }
    .rank-bronze      { background: rgba(180,100,60,0.25);  color: #d4835a; }
    .rank-silver      { background: rgba(160,180,210,0.25); color: #a0b8d8; }
    .rank-gold        { background: rgba(200,155,60,0.25);  color: #c89b3c; }
    .rank-platine     { background: rgba(60,180,140,0.25);  color: #50c8a0; }
    .rank-emeraude    { background: rgba(40,160,100,0.25);  color: #48c87a; }
    .rank-Diamant     { background: rgba(80,130,230,0.25);  color: #88aaee; }
    .rank-master      { background: rgba(180,80,200,0.25);  color: #d080e8; }
    .rank-grandmaster { background: rgba(220,60,60,0.25);   color: #e87070; }
    .rank-challenger  { background: rgba(200,155,60,0.35);  color: #f0c84a; border: 1px solid rgba(200,155,60,0.5); }

    .rank-Diamant, .rank-master, .rank-grandmaster, .rank-challenger {
      box-shadow: 0 0 8px rgba(120,160,255,0.35);
    }

    .role-top, .role-jungle, .role-mid, .role-adc, .role-supp {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted); font-weight: 500; font-size: 10px; opacity: 0.85;
    }
    .role-top:hover     { color: #e07060; border-color: rgba(224,112,96,0.3); }
    .role-jungle:hover  { color: #60c870; }
    .role-mid:hover     { color: #70a8f0; }
    .role-adc:hover     { color: #d4a840; }
    .role-supp:hover    { color: #b888ee; }

    .saved-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0;
    }
    .saved-header .field-label { margin-bottom: 0; }

    .saved-list { display: flex; flex-direction: column; gap: 5px; }
    .saved-empty { font-size: 12px; color: var(--text-muted); text-align: center; padding: 1rem 0; line-height: 1.8; }

    .saved-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 10px; gap: 8px;
      transition: border-color 0.15s;
    }
    .saved-row:hover { border-color: var(--border-hover); }
    .saved-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .saved-name {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .saved-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .btn-add {
      background: rgba(77,142,245,0.15); border: 1px solid rgba(77,142,245,0.3);
      color: var(--accent-blue); border-radius: var(--radius-sm);
      width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: background 0.15s;
    }
    .btn-add:hover:not(:disabled) { background: rgba(77,142,245,0.3); }
    .btn-add.added {
      background: rgba(60,180,100,0.15); border-color: rgba(60,180,100,0.3);
      color: #50c870; cursor: default;
    }

    .btn-del {
      background: none; border: 1px solid transparent; color: var(--text-muted);
      border-radius: var(--radius-sm); width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background 0.15s, color 0.15s;
    }
    .btn-del:hover { background: rgba(224,82,82,0.15); color: var(--accent-red); border-color: rgba(224,82,82,0.25); }

    .add-saved-form {
      display: none; flex-direction: column; gap: 7px;
      background: var(--bg-3); border: 1px solid var(--border-hover);
      border-radius: var(--radius-md); padding: 12px;
    }
    .add-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }

    .edit-saved-form {
      display: none; flex-direction: column; gap: 7px;
      background: var(--bg); border: 1px solid var(--border-hover);
      border-radius: var(--radius-md); padding: 10px; margin-top: 4px;
    }
    .edit-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* Storage status */
    .storage-status {
      font-size: 10px; color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .storage-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #50c870; flex-shrink: 0; transition: background 0.3s;
    }
    .storage-dot.saving { background: var(--accent-gold); animation: pulse 0.6s ease-in-out infinite alternate; }
    .storage-dot.error  { background: var(--accent-red); }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

    .divider { height: 1px; background: var(--border); margin: 0; }
    .team-score { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-left: 6px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 10px; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; height: auto; overflow: visible; }
      .sidebar-left, .sidebar-right { border: none; border-bottom: 1px solid var(--border); }
      .main-content { padding: 1.25rem; }
      .teams-grid { grid-template-columns: 1fr; }
      .player-row { grid-template-columns: 1fr 110px 28px 28px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ GAUCHE ══ -->
  <aside class="sidebar-left">
    <div class="sidebar-inner">

      <a href="index.html" class="brand" style="text-decoration:none;">
        <span class="brand-icon">⚔️</span>
        <div>
          <h1>Team Maker</h1>
          <p>League of Legends</p>
        </div>
      </a>

      <div class="divider"></div>

      <div>
        <p class="field-label">Nom de la partie</p>
        <input type="text" id="sessionName" placeholder="Soirée LoL du vendredi">
      </div>

      <div>
        <p class="field-label">
          Joueurs
          <span class="count-badge" id="playerCount">0 / 10</span>
        </p>
        <div class="player-grid" id="playerGrid"></div>
        <button class="btn-ghost sm" onclick="addPlayer()" id="addBtn" style="margin-top:4px">
          <i class="ti ti-plus"></i> Ajouter un joueur
        </button>
      </div>

      <div class="divider"></div>

      <div class="toggle-row">
        <input type="checkbox" id="rolesToggle">
        <label for="rolesToggle">
          <span class="toggle-title">Rôles aléatoires</span>
          <span class="toggle-sub">Top · Jungle · Mid · ADC · Supp<br>10 joueurs requis</span>
        </label>
      </div>

      <p class="error-msg" id="errorMsg"></p>

      <button class="btn-primary" onclick="generate()">
        <i class="ti ti-shield-half"></i> Générer les équipes
      </button>

    </div>
  </aside>

  <!-- ══ CENTRE ══ -->
  <main class="main-content">
    <div class="result-placeholder" id="placeholder">
      <i class="ti ti-sword placeholder-icon"></i>
      <p>Configure ta partie à gauche,<br>ajoute tes joueurs et génère les équipes.</p>
    </div>
    <div class="result" id="result">
      <div class="result-header">
        <h2 id="sessionTitle"></h2>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="btn-ghost sm" id="rerollRolesBtn" onclick="rerollRoles()" style="display:none" title="Garder les équipes, changer uniquement les rôles">
            <i class="ti ti-arrows-shuffle"></i> Relancer les rôles
          </button>
          <button class="btn-ghost sm" onclick="generate()">
            <i class="ti ti-refresh"></i> Regénérer
          </button>
        </div>
      </div>
      <div class="teams-grid" id="teamsGrid"></div>
      <p class="diff-row" id="diffRow"></p>
    </div>
  </main>

  <!-- ══ DROITE ══ -->
  <aside class="sidebar-right">
    <div class="sidebar-inner">

      <div class="saved-header">
        <p class="field-label" style="margin-bottom:0">Joueurs enregistrés</p>
        <button class="btn-ghost xs" onclick="openAddSaved()">
          <i class="ti ti-plus"></i> Nouveau
        </button>
      </div>

      <div class="storage-status" id="storageStatus">
        <span class="storage-dot" id="storageDot"></span>
        <span id="storageLabel">Chargement…</span>
      </div>

      <div id="savedList" class="saved-list"></div>

      <div class="add-saved-form" id="addSavedForm">
        <input type="text" id="savedName" placeholder="Nom du joueur">
        <select id="savedRank"></select>
        <div class="add-saved-actions">
          <button class="btn-ghost sm" onclick="closeAddSaved()">Annuler</button>
          <button class="btn-primary sm" onclick="saveNewPlayer()">Enregistrer</button>
        </div>
      </div>

    </div>
  </aside>
</div>

<script>
/* ─── Données ─── */
const RANKS = [
  { label: 'Débutant',    value: 0,  cls: 'rank-debutant' },
  { label: 'Iron',        value: 1,  cls: 'rank-iron' },
  { label: 'Bronze',      value: 2,  cls: 'rank-bronze' },
  { label: 'Silver',      value: 3,  cls: 'rank-silver' },
  { label: 'Gold',        value: 4,  cls: 'rank-gold' },
  { label: 'Platine',     value: 5,  cls: 'rank-platine' },
  { label: 'Emeraude',    value: 6,  cls: 'rank-emeraude' },
  { label: 'Diamant',     value: 7,  cls: 'rank-Diamant' },
  { label: 'Master',      value: 8,  cls: 'rank-master' },
  { label: 'Grandmaster', value: 9,  cls: 'rank-grandmaster' },
  { label: 'Challenger',  value: 10, cls: 'rank-challenger' },
];
const ROLES    = ['Top', 'Jungle', 'Mid', 'ADC', 'Supp'];
const ROLE_CLS = { Top:'role-top', Jungle:'role-jungle', Mid:'role-mid', ADC:'role-adc', Supp:'role-supp' };
const LS_KEY   = 'lol_teammaker_saved_v1';

/* ─── État ─── */
let players = [], idCounter = 0;
let lastMask = -1;
let savedPlayers = [];
let savedCounter = 0;
let lastT1 = [], lastT2 = [], lastS1 = 0, lastS2 = 0; // équipes actuellement affichées

/* ─── localStorage ─── */
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      savedPlayers = data.players || [];
      savedCounter = data.counter || savedPlayers.length;
    } else {
      savedPlayers = [];
      savedCounter = 0;
    }
  } catch (e) {
    savedPlayers = [];
    savedCounter = 0;
  }
  updateStorageStatus();
  renderSaved();
}

function persistSaved() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      players: savedPlayers,
      counter: savedCounter
    }));
    updateStorageStatus();
  } catch (e) {
    setStorageDot('error');
    document.getElementById('storageLabel').textContent = 'Erreur de sauvegarde';
  }
}

function updateStorageStatus() {
  setStorageDot('ok');
  const n = savedPlayers.length;
  document.getElementById('storageLabel').textContent =
    n === 0 ? 'Aucun joueur enregistré'
            : `${n} joueur${n > 1 ? 's' : ''} enregistré${n > 1 ? 's' : ''} — sauvegardé localement`;
}

function setStorageDot(state) {
  const dot = document.getElementById('storageDot');
  dot.className = 'storage-dot' + (state === 'error' ? ' error' : '');
}

/* ─── Helpers ─── */
function rankInfo(val) { return RANKS.find(r => r.value === val) || RANKS[0]; }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function rankOptions(sel) {
  return RANKS.map(r =>
    `<option value="${r.value}"${r.value === sel ? ' selected' : ''}>${r.label}</option>`
  ).join('');
}
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}
function popcount(n) { let c = 0; while (n) { c += n & 1; n >>= 1; } return c; }

/* ─── Joueurs (gauche) ─── */
function addPlayer(name = '', rank = 3) {
  if (players.length >= 10) return;
  players.push({ id: idCounter++, name, rank });
  lastMask = -1;
  renderGrid();
  renderSaved();
}
function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  lastMask = -1;
  renderGrid();
  renderSaved();
}
function updateName(id, val) {
  const p = players.find(p => p.id === id);
  if (p) {
    p.name = val;
    const alreadySaved = savedPlayers.some(s => s.name.toLowerCase() === val.trim().toLowerCase());
    const pinBtn = document.querySelector(`button[onclick="pinPlayer(${id})"]`);
    if (pinBtn) {
      pinBtn.disabled = val.trim() === '' || alreadySaved;
      pinBtn.className = 'pin-btn' + (alreadySaved ? ' pinned' : '');
      pinBtn.title = alreadySaved ? 'Déjà enregistré' : val.trim() ? 'Enregistrer ce joueur' : 'Entrez un nom d\x27abord';
      pinBtn.innerHTML = `<i class="ti ${alreadySaved ? 'ti-bookmark-filled' : 'ti-bookmark'}"></i>`;
    }
  }
}
function updateRank(id, val) { const p = players.find(p => p.id === id); if (p) p.rank = parseInt(val); }

function renderGrid() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  players.forEach((p, i) => {
    const alreadySaved = savedPlayers.some(s => s.name.toLowerCase() === p.name.trim().toLowerCase());
    const canPin = p.name.trim() !== '' && !alreadySaved;
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <input type="text" placeholder="Joueur ${i + 1}" value="${esc(p.name)}"
        oninput="updateName(${p.id}, this.value)">
      <select onchange="updateRank(${p.id}, this.value)">${rankOptions(p.rank)}</select>
      <button class="pin-btn${alreadySaved ? ' pinned' : ''}"
        onclick="pinPlayer(${p.id})"
        ${alreadySaved ? 'disabled' : ''}
        title="${alreadySaved ? 'Déjà enregistré' : 'Enregistrer ce joueur'}">
        <i class="ti ${alreadySaved ? 'ti-bookmark-filled' : 'ti-bookmark'}"></i>
      </button>
      <button class="remove-btn" onclick="removePlayer(${p.id})" aria-label="Retirer">
        <i class="ti ti-x"></i>
      </button>`;
    grid.appendChild(row);
  });
  document.getElementById('playerCount').textContent = `${players.length} / 10`;
  document.getElementById('addBtn').disabled = players.length >= 10;
}

function pinPlayer(id) {
  const p = players.find(p => p.id === id);
  if (!p || !p.name.trim()) return;
  if (savedPlayers.some(s => s.name.toLowerCase() === p.name.trim().toLowerCase())) return;
  savedPlayers.push({ id: 's' + savedCounter++, name: p.name.trim(), rank: p.rank });
  persistSaved();
  renderSaved();
  renderGrid(); // met à jour l'icône en "déjà enregistré"
}

/* ─── Joueurs sauvegardés (droite) ─── */
function renderSaved() {
  const list = document.getElementById('savedList');
  if (!savedPlayers.length) {
    list.innerHTML = `<p class="saved-empty">Aucun joueur enregistré.<br>
      <span style="font-size:11px;opacity:0.6">Clique sur « Nouveau » pour en ajouter.</span></p>`;
    return;
  }
  list.innerHTML = savedPlayers.map(sp => {
    const ri = rankInfo(sp.rank);
    const alreadyIn = players.some(p => p.name === sp.name);
    return `
      <div class="saved-row" id="row-${sp.id}">
        <div class="saved-info">
          <span class="saved-name">${esc(sp.name)}</span>
          <span class="badge ${ri.cls}">${ri.label}</span>
        </div>
        <div class="saved-actions">
          <button class="btn-add${alreadyIn ? ' added' : ''}"
            onclick="addFromSaved('${sp.id}')"
            ${alreadyIn || players.length >= 10 ? 'disabled' : ''}
            title="${alreadyIn ? 'Déjà dans la liste' : 'Ajouter à la partie'}">
            <i class="ti ${alreadyIn ? 'ti-check' : 'ti-plus'}"></i>
          </button>
          <button class="btn-ghost xs" onclick="openEditSaved('${sp.id}')" title="Modifier">
            <i class="ti ti-pencil"></i>
          </button>
          <button class="btn-del" onclick="deleteSaved('${sp.id}')" title="Supprimer">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </div>
      <div class="edit-saved-form" id="edit-${sp.id}">
        <input type="text" id="edit-name-${sp.id}" value="${esc(sp.name)}" placeholder="Nom du joueur">
        <select id="edit-rank-${sp.id}">${rankOptions(sp.rank)}</select>
        <div class="edit-saved-actions">
          <button class="btn-ghost sm" onclick="closeEditSaved('${sp.id}')">Annuler</button>
          <button class="btn-primary sm" onclick="applyEditSaved('${sp.id}')">Enregistrer</button>
        </div>
      </div>`;
  }).join('');
}

function addFromSaved(sid) {
  if (players.length >= 10) return;
  const sp = savedPlayers.find(s => s.id === sid);
  if (!sp) return;
  addPlayer(sp.name, sp.rank);
}

function deleteSaved(sid) {
  savedPlayers = savedPlayers.filter(s => s.id !== sid);
  persistSaved();
  renderSaved();
}

function openAddSaved() {
  document.getElementById('addSavedForm').style.display = 'flex';
  document.getElementById('savedName').focus();
}
function closeAddSaved() {
  document.getElementById('addSavedForm').style.display = 'none';
  document.getElementById('savedName').value = '';
}
function saveNewPlayer() {
  const name = document.getElementById('savedName').value.trim();
  const rank = parseInt(document.getElementById('savedRank').value);
  if (!name) { document.getElementById('savedName').focus(); return; }
  if (savedPlayers.some(s => s.name.toLowerCase() === name.toLowerCase())) {
    const input = document.getElementById('savedName');
    input.style.borderColor = 'var(--accent-red)';
    input.placeholder = 'Ce nom existe déjà !';
    setTimeout(() => {
      input.style.borderColor = '';
      input.placeholder = 'Nom du joueur';
    }, 1500);
    return;
  }
  savedPlayers.push({ id: 's' + savedCounter++, name, rank });
  persistSaved();
  closeAddSaved();
  renderSaved();
}

function openEditSaved(sid) {
  document.querySelectorAll('.edit-saved-form').forEach(el => el.style.display = 'none');
  const form = document.getElementById('edit-' + sid);
  if (form) { form.style.display = 'flex'; document.getElementById('edit-name-' + sid).focus(); }
}
function closeEditSaved(sid) {
  const form = document.getElementById('edit-' + sid);
  if (form) form.style.display = 'none';
}
function applyEditSaved(sid) {
  const name = document.getElementById('edit-name-' + sid).value.trim();
  const rank = parseInt(document.getElementById('edit-rank-' + sid).value);
  if (!name) return;
  const sp = savedPlayers.find(s => s.id === sid);
  if (!sp) return;
  sp.name = name;
  sp.rank = rank;
  persistSaved();
  closeEditSaved(sid);
  renderSaved();
  renderGrid();
}

/* ─── Algorithme ─── */
function bestSplit(arr) {
  const n = arr.length, half = n / 2;
  let bestDiff = Infinity;
  const bestMasks = [];
  for (let mask = 0; mask < (1 << n); mask++) {
    if (popcount(mask) !== half) continue;
    let s1 = 0, s2 = 0;
    for (let i = 0; i < n; i++) (mask & (1 << i)) ? s1 += arr[i].rank : s2 += arr[i].rank;
    const diff = Math.abs(s1 - s2);
    if (diff < bestDiff) { bestDiff = diff; bestMasks.length = 0; bestMasks.push(mask); }
    else if (diff === bestDiff) { bestMasks.push(mask); }
  }
  const seen = new Set(), unique = [];
  for (const mask of bestMasks) {
    const full = (1 << n) - 1;
    const key = Math.min(mask, (~mask) & full);
    if (!seen.has(key)) { seen.add(key); unique.push(mask); }
  }
  let pool = unique.filter(m => m !== lastMask);
  if (pool.length === 0) pool = unique;
  const chosen = pool[Math.floor(Math.random() * pool.length)];
  lastMask = chosen;
  const t1 = [], t2 = [];
  for (let i = 0; i < n; i++) (chosen & (1 << i)) ? t1.push(arr[i]) : t2.push(arr[i]);
  return [t1, t2, bestDiff, unique.length];
}

/* ─── Génération ─── */
function generate() {
  document.getElementById('errorMsg').style.display = 'none';
  const valid = players.filter(p => p.name.trim());
  if (valid.length < 2)       return showError('Ajoute au moins 2 joueurs avec un nom.');
  if (valid.length % 2 !== 0) return showError('Le nombre de joueurs doit être pair.');
  const useRoles = document.getElementById('rolesToggle').checked;
  if (useRoles && valid.length / 2 !== 5) return showError('Les rôles nécessitent exactement 10 joueurs.');

  const [t1, t2, diff, totalCombos] = bestSplit(valid.map(p => ({ ...p, rank: parseInt(p.rank) })));
  const roles1 = useRoles ? shuffle(ROLES) : null;
  const roles2 = useRoles ? shuffle(ROLES) : null;

  const name = document.getElementById('sessionName').value.trim();
  document.getElementById('sessionTitle').textContent = name ? `🎮 ${name}` : 'Résultat';

  const s1 = t1.reduce((a, p) => a + p.rank, 0);
  const s2 = t2.reduce((a, p) => a + p.rank, 0);

  // Mémoriser les équipes pour pouvoir régénérer uniquement les rôles
  lastT1 = t1; lastT2 = t2; lastS1 = s1; lastS2 = s2;

  document.getElementById('teamsGrid').innerHTML =
    buildTeam('🔵 Équipe 1', t1, s1, roles1, 'blue') +
    buildTeam('🔴 Équipe 2', t2, s2, roles2, 'red');

  const comboTxt = totalCombos > 1
    ? ` · ${totalCombos} combinaison${totalCombos > 1 ? 's' : ''} équitable${totalCombos > 1 ? 's' : ''}`
    : '';
  document.getElementById('diffRow').innerHTML =
    `Différence totale : <strong>${diff} point${diff !== 1 ? 's' : ''}</strong>${comboTxt}`;

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('result').style.display = 'flex';
  document.getElementById('rerollRolesBtn').style.display = useRoles ? 'inline-flex' : 'none';
}

function rerollRoles() {
  if (!lastT1.length) return;
  const roles1 = shuffle(ROLES);
  const roles2 = shuffle(ROLES);
  document.getElementById('teamsGrid').innerHTML =
    buildTeam('🔵 Équipe 1', lastT1, lastS1, roles1, 'blue') +
    buildTeam('🔴 Équipe 2', lastT2, lastS2, roles2, 'red');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function buildTeam(title, players, score, roles, color) {
  const avg = rankInfo(Math.round(score / players.length));
  const items = players.map((p, i) => {
    const ri = rankInfo(p.rank);
    const rb = roles ? `<span class="badge ${ROLE_CLS[roles[i]]}">${roles[i]}</span>` : '';
    return `<li>
      <span class="player-name">${esc(p.name)}</span>
      <span class="player-meta">${rb}<span class="badge ${ri.cls}">${ri.label}</span></span>
    </li>`;
  }).join('');
  return `<div class="team-card ${color}">
    <p class="team-name">${title} <span class="team-score">— ${score} pts</span></p>
    <p class="team-avg">Rang moyen : ${avg.label}</p>
    <ul class="team-list">${items}</ul>
  </div>`;
}

/* ─── Init ─── */
document.getElementById('savedRank').innerHTML = rankOptions(3);
renderGrid();
loadFromStorage();
</script>
