<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Plays Who - Valorant</title>
  <link rel="icon" type="image/png" href="Logo_Site/W.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="shared/rank-picker.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080B10;
      --bg-2:      #0E1218;
      --bg-3:      #141820;
      --bg-4:      #1C2230;
      --border:    rgba(255,70,85,0.1);
      --border-h:  rgba(255,70,85,0.22);
      --text:      #ECF0F1;
      --text-2:    #8899AA;
      --red:       #FF4655;
      --red-d:     #CC2233;
      --blue:      #7AB4FF;
      --gold:      #FFD166;
      --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

    .app { display: grid; grid-template-columns: 300px 1fr 270px; height: 100vh; overflow: hidden; }
    .panel { background: var(--bg-2); border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
    .panel-right { background: var(--bg-2); border-left: 1px solid var(--border); border-right: none; overflow-y: auto; overflow-x: hidden; }
    .main { overflow-y: auto; background: var(--bg); }
    .panel-inner { padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 10px; }

    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; padding: 0.25rem 0; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--red-d), var(--red)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 12px rgba(255,70,85,0.35); overflow:hidden; padding:6px; }
    .brand-icon img{width:100%;height:100%;object-fit:contain;}
    .brand-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .lang-switch { display:flex; align-items:center; border:1px solid var(--border-h); flex-shrink:0; }
    .lang-switch button {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      background: transparent; border: none; color: var(--text-2); padding: 5px 9px; cursor: pointer;
      transition: all 0.15s;
    }
    .lang-switch button.active { background: var(--red); color: #fff; }
    .lang-switch button:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .brand-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.01em; }
    .brand-sub { font-size: 10px; color: var(--red); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }

    .div { height: 1px; background: var(--border); }
    .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-2); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .cnt { background: var(--bg-4); color: var(--text-2); border-radius: 20px; padding: 1px 8px; font-size: 10px; font-weight: 500; text-transform: none; letter-spacing: 0; }

    input[type=text], select {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); padding: 8px 10px;
      font-size: 13px; font-family: var(--font); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .player-row select { padding: 8px 4px; font-size: 12px; width: auto; min-width: 0; }
    input[type=text]::placeholder { color: var(--text-2); opacity: 0.6; }
    input[type=text]:focus, select:focus { border-color: var(--red); }
    select { cursor: pointer; }
    select option { background: var(--bg-3); }

    .mode-sw { display: flex; gap: 3px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-md); padding: 3px; }
    .mode-btn { flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-2); font-family: var(--font); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .mode-btn.active { background: var(--bg-4); color: var(--red); box-shadow: 0 1px 6px rgba(0,0,0,0.4); }
    .mode-btn:not(.active):hover { color: var(--text); }

    .player-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
    .player-row { display: grid; grid-template-columns: 1fr auto 28px 28px; gap: 5px; align-items: center; }

    .btn-primary { background: linear-gradient(135deg, var(--red-d), var(--red)); color: #fff; border: none; border-radius: var(--r-md); padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: var(--font); transition: opacity 0.15s, transform 0.1s; box-shadow: 0 2px 16px rgba(255,70,85,0.3); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary.sm { padding: 6px 12px; font-size: 12px; width: auto; }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 11px; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font); transition: all 0.15s; }
    .btn-ghost:hover { background: var(--bg-3); color: var(--text); border-color: var(--border-h); }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-ghost.sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost.xs { padding: 3px 7px; font-size: 11px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-2); width: 28px; height: 28px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; padding: 0; }
    .btn-icon:hover { background: var(--bg-4); color: var(--text); }
    .btn-icon.pin.pinned { color: var(--red); }
    .btn-icon.pin.pinned:hover { background: rgba(255,70,85,0.15); color: #ff8090; }
    .btn-icon.del:hover { background: rgba(255,70,85,0.15); color: var(--red); }
    .btn-icon:disabled { opacity: 0.25; cursor: not-allowed; }


    /* Toggle rôles désactivé quand agents actifs */
    .toggle-row.disabled { opacity: 0.4; pointer-events: none; }
    .toggle-row.disabled input { cursor: not-allowed; }

    .toggle-row { display: flex; gap: 10px; align-items: flex-start; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 12px; transition: opacity 0.2s; }
    .toggle-row input[type=checkbox] { width: 14px; height: 14px; margin-top: 3px; flex-shrink: 0; cursor: pointer; accent-color: var(--red); }
    .toggle-row label { cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
    .tgl-title { font-size: 13px; color: var(--text); font-weight: 500; }
    .tgl-sub { font-size: 11px; color: var(--text-2); }

    .error-msg { display: none; font-size: 12px; color: #ff8090; background: rgba(255,70,85,0.1); border: 1px solid rgba(255,70,85,0.25); border-radius: var(--r-sm); padding: 8px 10px; }

    .saved-hd { display: flex; align-items: center; justify-content: space-between; }
    .saved-list { display: flex; flex-direction: column; gap: 4px; }
    .saved-empty { font-size: 12px; color: var(--text-2); text-align: center; padding: 1.2rem 0; line-height: 1.8; opacity: 0.6; }
    .saved-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 10px; gap: 8px; transition: border-color 0.15s; }
    .saved-row:hover { border-color: var(--border-h); }
    .saved-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .saved-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .btn-add { background: rgba(122,180,255,0.15); border: 1px solid rgba(122,180,255,0.3); color: var(--blue); border-radius: var(--r-sm); width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.15s; }
    .btn-add:hover:not(:disabled) { background: rgba(122,180,255,0.3); }
    .btn-add.added { background: rgba(60,180,100,0.15); border-color: rgba(60,180,100,0.3); color: #50c870; cursor: default; }
    .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }
    .add-saved-form { display: none; flex-direction: column; gap: 7px; background: var(--bg-3); border: 1px solid var(--border-h); border-radius: var(--r-md); padding: 11px; }
    .add-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .edit-saved-form { display: none; flex-direction: column; gap: 7px; background: var(--bg); border: 1px solid var(--border-h); border-radius: var(--r-md); padding: 10px; margin-top: 3px; }
    .edit-saved-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .storage-status { font-size: 10px; color: var(--text-2); display: flex; align-items: center; gap: 5px; opacity: 0.7; }
    .storage-dot { width: 5px; height: 5px; border-radius: 50%; background: #50c870; flex-shrink: 0; }
    .storage-dot.error { background: var(--red); }

    /* ── Saved search / autocomplete ── */
    .search-wrap { position: relative; }
    .search-wrap i.ti-search { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-2); pointer-events: none; }
    .search-wrap input[type=text] { padding-left: 30px; }
    .search-wrap .btn-icon.clear { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; }
    .suggestions-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-3); border: 1px solid var(--border-h);
      border-radius: var(--r-md); max-height: 230px; overflow-y: auto;
      z-index: 30; box-shadow: 0 10px 30px rgba(0,0,0,0.55); display: none;
    }
    .suggestion-item {
      padding: 8px 11px; font-size: 13px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--bg-4); }
    .suggestion-item .sugg-name strong { color: var(--red); }
    .suggestion-item.disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Rank badges → see shared/rank-picker.css (.rank-badge) ── */

    .role-badge { border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 600; white-space: nowrap; border: 1px solid; }
    .role-duelist    { background: rgba(255,80,90,0.12); color: #ff5058; border-color: rgba(255,80,90,0.3); }
    .role-initiator  { background: rgba(112,190,240,0.12); color: #70bef0; border-color: rgba(112,190,240,0.3); }
    .role-controller { background: rgba(170,120,238,0.12); color: #aa78ee; border-color: rgba(170,120,238,0.3); }
    .role-sentinel   { background: rgba(240,192,80,0.12); color: #f0c050; border-color: rgba(240,192,80,0.3); }

    .main-inner { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; min-height: 100%; }

    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; opacity: 0.35; padding: 3rem 0; }
    .placeholder-icon { font-size: 56px; }
    .placeholder p { font-size: 14px; line-height: 1.9; color: var(--text-2); }

    .result { display: none; flex-direction: column; gap: 1.5rem; }
    .result-hd { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .result-hd h2 { font-size: 20px; font-weight: 700; color: var(--text); }
    .result-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .diff-row { text-align: center; font-size: 12px; color: var(--text-2); padding: 0.25rem 0; }
    .diff-row strong { color: var(--red); }

    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .team-section { display: flex; flex-direction: column; gap: 10px; }
    .team-hd { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
    .team-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .team-title.blue { color: var(--blue); }
    .team-title.red  { color: var(--red); }
    .team-title.gold { color: var(--gold); }
    .team-score-lbl { font-size: 11px; color: var(--text-2); }

    /* ── PLAYER CARDS ── */
    .player-cards { display: flex; flex-direction: column; gap: 8px; }
    .player-card { position: relative; border-radius: var(--r-lg); overflow: hidden; background: var(--bg-3); border: 1px solid var(--border); transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; min-height: 80px; }
    .player-card:hover { border-color: var(--border-h); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
    .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.15; filter: blur(1px) saturate(0.5); transition: opacity 0.3s; }
    .player-card:hover .card-bg { opacity: 0.22; }
    .player-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
    .player-card.team-blue::before { background: linear-gradient(to bottom, var(--blue), #4a80cc); box-shadow: 2px 0 8px rgba(122,180,255,0.4); }
    .player-card.team-red::before  { background: linear-gradient(to bottom, var(--red), var(--red-d)); box-shadow: 2px 0 8px rgba(255,70,85,0.4); }
    .player-card.team-gold::before { background: linear-gradient(to bottom, var(--gold), #ccaa44); box-shadow: 2px 0 8px rgba(255,209,102,0.4); }
    .card-body { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 12px 14px; }
    .card-champ-placeholder { width: 52px; height: 52px; border-radius: 10px; background: var(--bg-4); border: 1px dashed var(--border-h); display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 20px; flex-shrink: 0; }
    .card-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .card-champ-name { font-size: 11px; color: var(--red); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-champ-name.empty { color: var(--text-2); opacity: 0.5; font-weight: 400; text-transform: none; font-style: italic; }
    .card-player-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

    .single-team { grid-column: 1 / -1; }
    .single-team .player-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }

    /* ── MAP ROULETTE ── */
    .map-roulette-section { display: flex; flex-direction: column; gap: 10px; }
    .roulette-window { position: relative; width: 100%; height: 180px; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); background: var(--bg); cursor: pointer; }
    .roulette-strip { display: flex; flex-direction: row; height: 100%; will-change: transform; }
    .roulette-item { flex-shrink: 0; width: 280px; height: 180px; position: relative; overflow: hidden; }
    .roulette-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .roulette-item-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 10px; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%); font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
    .roulette-indicator { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 3px; background: var(--red); box-shadow: 0 0 12px rgba(255,70,85,0.7); z-index: 10; pointer-events: none; }
    .roulette-indicator::before, .roulette-indicator::after { content: ''; position: absolute; left: 50%; transform: translateX(-50%); width: 0; height: 0; }
    .roulette-indicator::before { top: -1px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 8px solid var(--red); }
    .roulette-indicator::after  { bottom: -1px; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 8px solid var(--red); }
    .roulette-fade-left, .roulette-fade-right { position: absolute; top: 0; bottom: 0; width: 80px; z-index: 5; pointer-events: none; }
    .roulette-fade-left  { left:  0; background: linear-gradient(to right, rgba(8,11,16,0.92), transparent); }
    .roulette-fade-right { right: 0; background: linear-gradient(to left,  rgba(8,11,16,0.92), transparent); }
    .map-result-card { display: none; align-items: center; gap: 14px; background: var(--bg-3); border: 1px solid var(--border-h); border-radius: var(--r-md); padding: 12px; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .map-result-card.visible { display: flex; }
    .map-result-thumb { width: 110px; height: 66px; border-radius: var(--r-sm); object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-h); }
    .map-result-info { display: flex; flex-direction: column; gap: 3px; }
    .map-result-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.07em; }
    .map-result-name  { font-size: 22px; font-weight: 700; color: var(--text); }


    /* ── Role block (droite de la carte) ── */
    .card-role {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; flex-shrink: 0; padding: 0 4px;
      min-width: 52px;
    }
    .card-role img {
      width: 34px; height: 34px; object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
    }
    .card-role-name {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-2); white-space: nowrap;
    }


    /* ── Cartes verticales mode Five Stack - même structure que LoL Flex ── */
    .player-card-v {
      width: 100%; border-radius: var(--r-lg); overflow: hidden;
      background: var(--bg-3); border: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
    }
    .player-card-v:hover { border-color: var(--border-h); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
    .player-card-v::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2; }
    .player-card-v.team-gold::before { background: linear-gradient(90deg, var(--gold), #ccaa44); }
    .player-card-v.team-blue::before { background: linear-gradient(90deg, var(--blue), #4a80cc); }
    .player-card-v.team-red::before  { background: linear-gradient(90deg, var(--red), var(--red-d)); }

    /* Zone image - aspect-ratio carré, même que LoL */
    .card-v-img-wrap {
      width: 100%; aspect-ratio: 1 / 1; overflow: hidden;
      background: var(--bg-4); position: relative;
    }
    .card-v-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; transition: transform 0.3s;
    }
    .player-card-v:hover .card-v-img-wrap img { transform: scale(1.04); }
    .card-v-img-wrap .role-icon-wrap {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .card-v-img-wrap .role-icon-wrap img {
      width: 50%; height: 50%; object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); opacity: 0.85;
      transform: none !important; transition: none !important;
    }
    .card-v-img-wrap .no-agent-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 40px; opacity: 0.3;
    }
    .btn-reroll-single {
      position: absolute; width: 19px; height: 19px; border-radius: 50%;
      background: var(--bg-4); border: 1px solid var(--border-h);
      color: var(--red); display: flex; align-items: center; justify-content: center;
      font-size: 10px; cursor: pointer; transition: all 0.15s; padding: 0; z-index: 3;
    }
    .btn-reroll-single:hover { background: var(--red); color: #fff; transform: rotate(90deg); }
    .card-champ-wrap { position: relative; flex-shrink: 0; }
    .card-champ-wrap .btn-reroll-single { bottom: -4px; right: -4px; }
    .card-v-img-wrap .btn-reroll-single {
      bottom: 6px; right: 6px; width: 24px; height: 24px; font-size: 12px;
      background: rgba(13,13,16,0.75); backdrop-filter: blur(4px);
    }

    /* Infos bas de carte */
    .card-v-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 5px; }
    .card-v-agent-name {
      font-size: 11px; font-weight: 700; color: var(--red);
      text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

    :root {

      content:''; position:absolute; top:0; left:0; right:0; height:2px;

    }

    .brand-icon, .nav-icon {

const ROLES    = ['Duelist', 'Duelist', 'Initiator', 'Controller', 'Sentinel'];

const ROLE_BADGE_CLS = { Duelist:'role-badge role-duelist', Initiator:'role-badge role-initiator', Controller:'role-badge role-controller', Sentinel:'role-badge role-sentinel' };

const AGENTS_BY_ROLE = {
  Duelist:    ['Jett','Neon','Phoenix','Raze','Reyna','Iso','Waylay','Yoru'],
  Initiator:  ['Breach','Fade','Gekko','KayO','Skye','Sova','Tejo'],

  Sentinel:   ['Chamber','Cypher','Deadlock','Killjoy','Sage','Vyse','Miks'],
};

// Pioche un agent pour un rôle précis, sans doublon sur toute la partie
function pickAgentForRole(role, usedAgents) {
  const pool = AGENTS_BY_ROLE[role].filter(a => !usedAgents.has(a));
  if (!pool.length) return null; // tous pris (ne devrait pas arriver avec 5 joueurs max)
  const pick = pool[Math.floor(Math.random() * pool.length)];
  usedAgents.add(pick);
  return pick;
}

function pickAgentsForRoles(roles) {
  const used = new Set();
  return roles.map(role => pickAgentForRole(role, used));
}

// Sans rôles : tirage libre sans doublon
function pickAgents(count) {
  const all = Object.values(AGENTS_BY_ROLE).flat();
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function loadFromStorage() {

  document.getElementById('storageDot').className = 'storage-dot';

function rankOptions(sel) { return RANKS.map(r => `<option value="${r.value}"${r.value===sel?' selected':''}>${r.label}</option>`).join(''); }
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }
function popcount(n) { let c=0; while(n){ c+=n&1; n>>=1; } return c; }

/* ══ ROULETTE MAPS ══ */
const ITEM_W = 280;

// Construit la bande et centre immédiatement sur la map donnée (sans transition)
function buildRouletteStrip(centeredMapIndex) {
  const strip = document.getElementById('rouletteStrip');
  const win   = document.getElementById('rouletteWindow');
  strip.innerHTML = '';
  const cycles = 6;
  for (let i = 0; i < MAPS.length * cycles; i++) {
    const map = MAPS[i % MAPS.length];
    const item = document.createElement('div');
    item.className = 'roulette-item';
    item.innerHTML = `<img src="img/${map}_chargement.png" alt="${map}"><div class="roulette-item-label">${map}</div>`;
    strip.appendChild(item);
  }
  // Centre sur le slot demandé (cycle 0 par défaut)
  const slot = (centeredMapIndex !== undefined) ? centeredMapIndex : 0;
  const winW = win.getBoundingClientRect().width || win.offsetWidth || 600;
  const x = (winW / 2) - (slot * ITEM_W + ITEM_W / 2);
  strip.style.transition = 'none';
  strip.style.transform  = `translateX(${x}px)`;
}

function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

function spinRoulette() {
  if (rouletteSpinning) return;
  rouletteSpinning = true;

  const strip    = document.getElementById('rouletteStrip');
  const win      = document.getElementById('rouletteWindow');
  const spinBtn  = document.getElementById('spinBtn');
  const rerollBtn= document.getElementById('rerollBtn');
  const card     = document.getElementById('mapResultCard');

  spinBtn.disabled = true;
  card.classList.remove('visible');

  const winW = win.getBoundingClientRect().width || win.offsetWidth || 600;

  // Reconstruire la bande fraîche et partir du slot 0 centré
  buildRouletteStrip(0);
  strip.getBoundingClientRect(); // force reflow

  // Choisir une map différente de la précédente
  let targetIdx;
  do { targetIdx = Math.floor(Math.random() * MAPS.length); }
  while (targetIdx === lastMapIndex && MAPS.length > 1);
  lastMapIndex = targetIdx;

  // Landing dans le 3e cycle
  const landingSlot = 2 * MAPS.length + targetIdx;

  const startX  = (winW / 2) - (ITEM_W / 2);
  const targetX = (winW / 2) - (landingSlot * ITEM_W + ITEM_W / 2);

  const duration = 2800;
  let startTime  = null;
  const dist     = startX - targetX;

  function animate(ts) {
    if (!startTime) startTime = ts;
    const t    = Math.min((ts - startTime) / duration, 1);
    const ease = easeOutExpo(t);
    strip.style.transform = `translateX(${startX - dist * ease}px)`;

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      // Stopper exactement sur la map choisie - dans le cycle 0 cette fois
      // pour que l'image reste affichée correctement sans rebuild
      strip.style.transform = `translateX(${targetX}px)`;
      rouletteSpinning  = false;
      spinBtn.disabled  = false;
      rerollBtn.disabled = false;

      const mapName = MAPS[targetIdx];
      document.getElementById('mapResultName').textContent = mapName;
      document.getElementById('mapResultThumb').src = `img/${mapName}_chargement.png`;
      document.getElementById('mapResultThumb').alt = mapName;
      card.classList.add('visible');
      // Pas de rebuild ici - la bande reste en place sur la map choisie
    }
  }
  requestAnimationFrame(animate);
}

  const q = query.trim().toLowerCase();

  return savedPlayers.filter(s => s.name.toLowerCase().includes(q));
}

function highlightMatch(name, query) {
  const q = query.trim();
  if (!q) return esc(name);
  const idx = name.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return esc(name);
  return esc(name.slice(0, idx)) + '<strong>' + esc(name.slice(idx, idx + q.length)) + '</strong>' + esc(name.slice(idx + q.length));
}

function updateSavedSuggestions(query) {
  const dd = document.getElementById('savedSuggestions');
  const q = query.trim();
  if (!q) { dd.style.display = 'none'; dd.innerHTML = ''; return; }
  const matches = matchSavedPlayers(q).slice(0, 8);
  if (!matches.length) {
    dd.innerHTML = `<div class="suggestion-item disabled">${t('noPlayerFound')}</div>`;
    dd.style.display = 'block';

  }
  dd.innerHTML = matches.map(sp => {

    const full = players.length >= getMaxPlayers();
    const disabled = alreadyIn || full;
    return `<div class="suggestion-item${disabled?' disabled':''}" onmousedown="event.preventDefault();selectSuggestion('${sp.id}')">
      <span class="sugg-name">${highlightMatch(sp.name, q)}</span>

  }).join('');
  dd.style.display = 'block';
}

function selectSuggestion(sid) {
  const sp = savedPlayers.find(s => s.id === sid); if (!sp) return;
  if (players.some(p => p.name === sp.name) || players.length >= getMaxPlayers()) return;
  addFromSaved(sid);
  document.getElementById('savedSearch').value = '';
  savedSearchQuery = '';
  document.getElementById('savedSearchClear').style.display = 'none';
  document.getElementById('savedSuggestions').style.display = 'none';
  renderSaved();
}

function onSavedSearchKeydown(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const q = e.target.value.trim().toLowerCase();
    if (!q) return;
    const exact = savedPlayers.find(s => s.name.toLowerCase() === q);
    if (exact) { selectSuggestion(exact.id); return; }
    const matches = matchSavedPlayers(q);
    if (matches.length === 1) selectSuggestion(matches[0].id);
  } else if (e.key === 'Escape') {
    document.getElementById('savedSuggestions').style.display = 'none';
  }
}

function bestSplit(arr) {
  const n=arr.length, half=n/2; let bestDiff=Infinity; const bestMasks=[];
  for(let mask=0;mask<(1<<n);mask++) {
    if(popcount(mask)!==half) continue;
    let s1=0,s2=0;
    for(let i=0;i<n;i++) (mask&(1<<i))?s1+=arr[i].rank:s2+=arr[i].rank;
    const diff=Math.abs(s1-s2);
    if(diff<bestDiff){ bestDiff=diff; bestMasks.length=0; bestMasks.push(mask); }
    else if(diff===bestDiff) bestMasks.push(mask);
  }
  const seen=new Set(), unique=[];
  for(const mask of bestMasks){ const full=(1<<n)-1; const key=Math.min(mask,(~mask)&full); if(!seen.has(key)){ seen.add(key); unique.push(mask); } }
  let pool=unique.filter(m=>m!==lastMask); if(!pool.length) pool=unique;
  const chosen=pool[Math.floor(Math.random()*pool.length)];
  lastMask=chosen;
  const t1=[],t2=[];
  for(let i=0;i<n;i++) (chosen&(1<<i))?t1.push(arr[i]):t2.push(arr[i]);
  return [t1,t2,bestDiff,unique.length];
}

function generate() {
  document.getElementById('errorMsg').style.display='none';
  const valid=players.filter(p=>p.name.trim());
  const useAgents=document.getElementById('agentToggle').checked;
  // Agents impliquent les rôles automatiquement
  const useRoles = document.getElementById('rolesToggle').checked || useAgents;

  if (currentMode === 'fivestack') {
    if (valid.length < 1) return showError(t('errMin1'));
    if (valid.length > 5) return showError(t('errMax5'));
    if (useRoles && valid.length !== 5) return showError(t('errRoles5'));
    if (useAgents && !useRoles && valid.length > Object.values(AGENTS_BY_ROLE).flat().length)
      return showError(CUR_LANG === 'en' ? "More players than available agents." : "Plus de joueurs que d'agents disponibles.");
    const roles = useRoles ? shuffle(ROLES) : null;
    // Agents : toujours respectent le rôle si rôles actifs
    let agents = null;
    if (useAgents) agents = roles ? pickAgentsForRoles(roles) : pickAgents(valid.length);
    const score = valid.reduce((a,p)=>a+parseInt(p.rank),0);
    lastT1=valid; lastT2=[]; lastS1=score; lastS2=0;
    lastRoles1=roles; lastRoles2=null; lastAgents1=agents; lastAgents2=null;
    document.getElementById('sessionTitle').textContent = t('sessionFiveStack');
    document.getElementById('teamsGrid').className = 'teams-grid mode-single';
    document.getElementById('teamsGrid').innerHTML = buildFiveStackCards('⚔️ Ton équipe', valid, roles, agents, 'gold');
    document.getElementById('diffRow').innerHTML = '';
  } else {
    if (valid.length < 2) return showError(t('errMin2'));
    if (valid.length % 2 !== 0) return showError(t('errEven'));
    if (useRoles && valid.length !== 10) return showError(t('errRoles10'));
    const [t1,t2,diff,combos]=bestSplit(valid.map(p=>({...p,rank:parseInt(p.rank)})));
    const roles1=useRoles?shuffle(ROLES):null, roles2=useRoles?shuffle(ROLES):null;
    let agents1=null, agents2=null;
    if (useAgents) {
      if (roles1) {
        // Agents par rôle, pool partagé entre les deux équipes (pas de doublon global)
        const used = new Set();
        agents1 = roles1.map(r => pickAgentForRole(r, used));
        agents2 = roles2.map(r => pickAgentForRole(r, used));
      } else {
        const all = pickAgents(t1.length + t2.length);
        agents1 = all.slice(0, t1.length); agents2 = all.slice(t1.length);
      }
    }
    document.getElementById('sessionTitle').textContent = t('sessionResult');
    const s1=t1.reduce((a,p)=>a+p.rank,0), s2=t2.reduce((a,p)=>a+p.rank,0);
    lastT1=t1; lastT2=t2; lastS1=s1; lastS2=s2;
    lastRoles1=roles1; lastRoles2=roles2; lastAgents1=agents1; lastAgents2=agents2;
    document.getElementById('teamsGrid').className = 'teams-grid';
    document.getElementById('teamsGrid').innerHTML =
      buildTeamSection('🔵 Équipe 1',t1,s1,roles1,agents1,'blue','team1')+
      buildTeamSection('🔴 Équipe 2',t2,s2,roles2,agents2,'red','team2');
    const ctxt=combos>1?` · ${combos} ${t('combosLabel')}`:'';
    document.getElementById('diffRow').innerHTML = `${t('diffLabel')} : <strong>${diff} ${t('pts')}</strong>${ctxt}`;
  }
  document.getElementById('placeholder').style.display='none';
  document.getElementById('result').style.display='flex';
  document.getElementById('rerollRolesBtn').style.display = useRoles?'inline-flex':'none';
  document.getElementById('rerollAgentsBtn').style.display = useAgents?'inline-flex':'none';
}

function rerollRoles() {
  if(!lastT1.length) return;
  const useAgents = document.getElementById('agentToggle').checked;
  if(currentMode==='fivestack') {
    lastRoles1=shuffle(ROLES);
    // Resync agents sur les nouveaux rôles
    if (useAgents && lastAgents1) lastAgents1 = pickAgentsForRoles(lastRoles1);
    document.getElementById('teamsGrid').className = 'teams-grid mode-single';
    document.getElementById('teamsGrid').innerHTML = buildFiveStackCards('⚔️ Ton équipe',lastT1,lastRoles1,lastAgents1,'gold');
  } else {
    lastRoles1=shuffle(ROLES); lastRoles2=shuffle(ROLES);
    if (useAgents && lastAgents1) {
      const used = new Set();
      lastAgents1 = lastRoles1.map(r => pickAgentForRole(r, used));
      lastAgents2 = lastRoles2.map(r => pickAgentForRole(r, used));
    }
    document.getElementById('teamsGrid').className = 'teams-grid';
    document.getElementById('teamsGrid').innerHTML =
      buildTeamSection('🔵 Équipe 1',lastT1,lastS1,lastRoles1,lastAgents1,'blue','team1')+
      buildTeamSection('🔴 Équipe 2',lastT2,lastS2,lastRoles2,lastAgents2,'red','team2');
  }
}

function rerollAgents() {
  if(!lastT1.length) return;
  if(currentMode==='fivestack') {
    lastAgents1 = lastRoles1 ? pickAgentsForRoles(lastRoles1) : pickAgents(lastT1.length);
    document.getElementById('teamsGrid').className = 'teams-grid mode-single';
    document.getElementById('teamsGrid').innerHTML = buildFiveStackCards('⚔️ Ton équipe',lastT1,lastRoles1,lastAgents1,'gold');
  } else {
    if (lastRoles1) {
      const used = new Set();
      lastAgents1 = lastRoles1.map(r => pickAgentForRole(r, used));
      lastAgents2 = lastRoles2.map(r => pickAgentForRole(r, used));
    } else {
      const all = pickAgents(lastT1.length + lastT2.length);
      lastAgents1 = all.slice(0, lastT1.length); lastAgents2 = all.slice(lastT1.length);
    }
    document.getElementById('teamsGrid').className = 'teams-grid';
    document.getElementById('teamsGrid').innerHTML =
      buildTeamSection('🔵 Équipe 1',lastT1,lastS1,lastRoles1,lastAgents1,'blue','team1')+
      buildTeamSection('🔴 Équipe 2',lastT2,lastS2,lastRoles2,lastAgents2,'red','team2');
  }
}

/* ─── Build five stack cards (layout vertical) ─── */
function buildFiveStackCards(title, players, roles, agents, color) {
  const cards = players.map((p,i) => {
    const ri = rankInfo(p.rank);
    const role  = roles  ? roles[i]  : null;
    const agent = agents ? agents[i] : null;

    let imgContent;
    if (agent) {
      imgContent = `<img src="icon_agent/${agent}.png" alt="${agent}" onerror="this.style.display='none'">`;
    } else if (role) {
      imgContent = `<div class="role-icon-wrap"><img src="${ROLE_IMG[role]}" alt="${role}"></div>`;
    } else {
      imgContent = `<div class="no-agent-placeholder"><i class="ti ti-user"></i></div>`;
    }

    const agentName = agent ? `<div class="card-v-agent-name">${agent}</div>` : '';
    const roleInfo  = role
      ? `<div class="card-v-role-info"><img src="${ROLE_IMG[role]}" alt="${role}"><span class="card-v-role-name-big">${role}</span></div>`
      : '';
    const rerollBtn = agent
      ? `<button class="btn-reroll-single" onclick="event.stopPropagation();rerollSinglePlayer('flex',${i})" title="Je n'ai pas cet agent - relancer">
           <i class="ti ti-refresh"></i>
         </button>`
      : '';

    return `<div class="player-card-v team-${color}">
      <div class="card-v-img-wrap">${imgContent}${rerollBtn}</div>
      <div class="card-v-body">
        ${agentName}
        <div class="card-v-player">${esc(p.name)}</div>
        <div class="card-v-footer">
          ${roleInfo}
          ${rankBadge(p.rank)}
        </div>
      </div>
    </div>`;
  }).join('');

  const cols = Math.min(players.length, 5);
  return `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px;width:100%">${cards}</div>`;
}

function buildTeamSection(title, players, score, roles, agents, color, side) {
  const avg = rankInfo(Math.round(score/players.length));
  const cards = players.map((p,i) => {
    const ri = rankInfo(p.rank);
    const role  = roles  ? roles[i]  : null;
    const agent = agents ? agents[i] : null;
    const rerollBtn = agent
      ? `<button class="btn-reroll-single" onclick="event.stopPropagation();rerollSinglePlayer('${side}',${i})" title="Je n'ai pas cet agent - relancer">
           <i class="ti ti-refresh"></i>
         </button>`
      : '';
    // Portrait agent à gauche si dispo
    const agentImg = agent
      ? `<div class="card-champ-wrap"><img class="card-champ-img" src="icon_agent/${agent}.png" alt="${agent}"
           style="border-radius:10px;width:52px;height:52px;object-fit:cover;display:block;"
           onerror="this.style.display='none'">${rerollBtn}</div>`
      : '';
    const agentName = agent ? `<span class="card-champ-name" style="color:var(--red)">${agent}</span>` : '';
    const roleBlock = role
      ? `<div class="card-role">
           <img src="${ROLE_IMG[role]}" alt="${role}">
           <span class="card-role-name">${role}</span>
         </div>`
      : '';
    // grid: [agent?] [info] [role?]
    const cols = [agent ? '52px' : null, '1fr', role ? '52px' : null].filter(Boolean).join(' ');
    return `<div class="player-card team-${color}">
      ${agent ? `<div class="card-bg" style="background-image:url('icon_agent/${agent}.png')"></div>` : ''}
      <div class="card-body" style="grid-template-columns:${cols}">
        ${agentImg}
        <div class="card-info">
          ${agentName}
          <span class="card-player-name">${esc(p.name)}</span>
          <div class="card-badges">${rankBadge(p.rank)}</div>
        </div>
        ${roleBlock}
      </div>
    </div>`;
  }).join('');
  return `<div class="team-section">
    <div class="team-hd">
      <span class="team-title ${color}">${title}</span>
      <span class="team-score-lbl">${score} ${t('pts')} · ${t('avg')} ${avg.label}</span>
    </div>
    <div class="player-cards">${cards}</div>
  </div>`;
}

/* ─── Relancer l'agent d'un seul joueur ───
   Garde tout le reste identique : équipes, rôles, autres agents.
   Respecte strictement le rôle de l'agent (mapping fixe) et évite les
   doublons avec les agents actuellement attribués dans la partie. */
function rerollSinglePlayer(side, idx) {
  const used = new Set([...(lastAgents1||[]), ...(lastAgents2||[])].filter(Boolean));
  let role = null, current = null;
  if (side === 'flex') { role = lastRoles1 ? lastRoles1[idx] : null; current = lastAgents1[idx]; }
  else if (side === 'team1') { role = lastRoles1 ? lastRoles1[idx] : null; current = lastAgents1[idx]; }
  else { role = lastRoles2 ? lastRoles2[idx] : null; current = lastAgents2[idx]; }
  used.delete(current);

  const newAgent = role ? pickAgentForRole(role, used) : current;

  if (side === 'flex') lastAgents1[idx] = newAgent;
  else if (side === 'team1') lastAgents1[idx] = newAgent;
  else lastAgents2[idx] = newAgent;

  if (currentMode === 'fivestack') {
    document.getElementById('teamsGrid').innerHTML = buildFiveStackCards('⚔️ Ton équipe', lastT1, lastRoles1, lastAgents1, 'gold');
  } else {
    document.getElementById('teamsGrid').innerHTML =
      buildTeamSection('🔵 Équipe 1', lastT1, lastS1, lastRoles1, lastAgents1, 'blue', 'team1') +
      buildTeamSection('🔴 Équipe 2', lastT2, lastS2, lastRoles2, lastAgents2, 'red', 'team2');
  }
}

document.getElementById('savedRankField').outerHTML = renderRankField('savedRankField', 3);
renderGrid(); loadFromStorage(); updateRolesToggleVisibility();
requestAnimationFrame(() => buildRouletteStrip());
setLang(CUR_LANG);
</script>
